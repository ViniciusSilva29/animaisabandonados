<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário - Abandono de Animais</title>
    <link rel="stylesheet" href="assets/css/form.css">
</head>
<body align ="left">

    <div class="rodape">
        <h1>Cadastro!</h1>
        <nav>
            <ul>
                <a href="index.html">Inicio</a>
                <a href="sobre.html">Sobre</a>
                <a href="animais.html">Animais</a>
            </ul>
        </nav>
    </div>

<form action="resultadoform.php" method="post">
    <h2>Preencha seu cadastro e adote seu animal!</h2>

    <br>
    <br>
    <br>

    <label for="nome">Nome (opcional):</label>
    <input type="text" id="nome" name="nome">

    <br>
    <br>
    <br>

    <br>
    <br>
    <br>

    <label for="email">E-mail para contato:</label>
    <input type="email" id="email" name="email" required>

    <br>
    <br>
    <br>

    <label for="tipo">Tipo de animal:</label>
    <select id="tipo" name="tipo">
        <option value="cachorro">Cães</option>
        <option value="gato">Gatos</option>
        <option value="aves">Aves</option>
        <option value="coelho">Coelhos</option>
        <option value="cavalo">Cavalos</option>
        <option value="porco">Porcos</option>
    </select>

    <br>
    <br>
    <br>

    <label for="descricao">Motivo da adoção</label>
    <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva o que aconteceu..." required></textarea>

    <br>
    <br>
    <br>

    <label for="data">Data da adoção:</label>
    <input type="date" id="data" name="data">

    <br>
    <br>
    <br>

    <button type="submit">Enviar adoção</button>
</form>

    </footer>

</body>
</html>
